name: Cross-Library Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - "Sources/ProximaKit/**"
      - "Benchmarks/**"
      - ".github/workflows/benchmark.yml"
      - ".github/workflows/benchmark-core.yml"
      - ".github/ci-scripts/**"
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly
  workflow_dispatch:
    inputs:
      slice:
        description: "Which slice to run"
        type: choice
        default: smoke
        options: [smoke, full]

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

# The smoke and full slices share one job body, factored into the reusable
# benchmark-core.yml (workflow_call) — only the inputs below differ. This
# resolves the old TODO(audit/ci) about the two ~100-line copy-pasted jobs.
#
# NOTE: with workflow_call the PR check name gains the caller-job prefix:
# "Benchmark (smoke, 10K)" is now reported as "smoke / Benchmark (smoke, 10K)".
# main has no branch-protection required checks today, so nothing references
# the old name — but update any future required-check config accordingly.
jobs:
  smoke:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.slice == 'smoke')
    uses: ./.github/workflows/benchmark-core.yml
    with:
      slice: smoke
      size: "10000"
      queries: "200"
      size_label: "10K"
      # PR regression gate on ProximaKit recall@10; latency stays advisory.
      gate: true
      min_recall: "0.90"

  full:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.slice == 'full')
    uses: ./.github/workflows/benchmark-core.yml
    with:
      slice: full
      size: "100000"
      queries: "1000"
      size_label: "100K"
      # Nightly/full runs are informational — no recall gate, so a noisy
      # scheduled run cannot page anyone. The PR smoke job is the gate.
      gate: false
