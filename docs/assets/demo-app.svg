<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif" font-size="13">
  <style>
    .t { fill: #c9d1d9; } .dim { fill: #8b949e; } .panel { fill: #161b22; stroke: #30363d; }
    .row { opacity: 0; animation: rrow 9s ease-out infinite; }
    .r1 { animation-delay: 1.2s; } .r2 { animation-delay: 1.5s; } .r3 { animation-delay: 1.8s; }
    .r4 { animation-delay: 2.1s; } .r5 { animation-delay: 2.4s; }
    @keyframes rrow { 0% { opacity: 0; transform: translateY(6px);} 4% { opacity: 1; transform: translateY(0);} 92% { opacity: 1;} 100% { opacity: 0;} }
    .knob { animation: slide 9s ease-in-out infinite; }
    @keyframes slide { 0%,55% { transform: translateX(0);} 70%,90% { transform: translateX(46px);} 100% { transform: translateX(0);} }
    .caret { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <!-- window -->
  <rect fill="#0d1117" width="760" height="430" rx="12"/>
  <path fill="#161b22" d="M0 12 A12 12 0 0 1 12 0 H748 A12 12 0 0 1 760 12 V36 H0 Z"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/><circle cx="44" cy="18" r="6" fill="#febc2e"/><circle cx="64" cy="18" r="6" fill="#28c840"/>
  <text x="380" y="23" text-anchor="middle" class="dim" font-size="12">ProximaDemoApp — 48 documents, indexed on launch</text>

  <!-- sidebar -->
  <rect class="panel" x="16" y="52" width="200" height="360" rx="10"/>
  <text x="32" y="80" class="t" font-weight="600">Index</text>
  <text x="32" y="104" class="dim">Corpus: 48 docs</text>
  <text x="32" y="122" class="dim">Dimension: 512d</text>
  <text x="32" y="140" class="dim">Metric: cosine</text>

  <text x="32" y="178" class="t">efSearch</text>
  <rect x="32" y="188" width="168" height="4" rx="2" fill="#30363d"/>
  <rect x="32" y="188" width="92" height="4" rx="2" fill="#58a6ff"/>
  <circle class="knob" cx="124" cy="190" r="8" fill="#c9d1d9"/>
  <text x="172" y="178" class="dim">50</text>

  <rect x="32" y="224" width="168" height="30" rx="7" fill="#21262d" stroke="#30363d"/>
  <text x="116" y="243" text-anchor="middle" class="t">＋ Add Note</text>
  <rect x="32" y="262" width="168" height="30" rx="7" fill="#21262d" stroke="#30363d"/>
  <text x="116" y="281" text-anchor="middle" class="t">＋ Add Image</text>

  <text x="32" y="330" class="dim" font-size="11">● &lt; 0.55 strong</text>
  <text x="32" y="348" class="dim" font-size="11">● &lt; 0.68 partial</text>
  <text x="32" y="366" class="dim" font-size="11">● ≥ 0.68 weak</text>

  <!-- main panel -->
  <rect class="panel" x="232" y="52" width="512" height="360" rx="10"/>
  <rect x="248" y="68" width="480" height="34" rx="8" fill="#0d1117" stroke="#30363d"/>
  <text x="262" y="90" class="t">space exploration</text>
  <rect class="caret" x="382" y="76" width="2" height="18" fill="#58a6ff"/>

  <g class="row r1">
    <text x="262" y="132" fill="#3fb950">●</text><text x="282" y="132" class="dim">0.41</text>
    <text x="322" y="132" class="t">Astronauts aboard the ISS conduct experiments daily</text>
  </g>
  <g class="row r2">
    <text x="262" y="162" fill="#3fb950">●</text><text x="282" y="162" class="dim">0.44</text>
    <text x="322" y="162" class="t">NASA launched a new rover to explore the Martian surface</text>
  </g>
  <g class="row r3">
    <text x="262" y="192" fill="#3fb950">●</text><text x="282" y="192" class="dim">0.48</text>
    <text x="322" y="192" class="t">The moon landing changed how humanity sees itself</text>
  </g>
  <g class="row r4">
    <text x="262" y="222" fill="#d29922">●</text><text x="282" y="222" class="dim">0.51</text>
    <text x="322" y="222" class="t">Scientists study black holes to understand gravity</text>
  </g>
  <g class="row r5">
    <text x="262" y="252" fill="#d29922">●</text><text x="282" y="252" class="dim">0.55</text>
    <text x="322" y="252" class="t">The James Webb telescope captures distant galaxies</text>
  </g>

  <text x="262" y="394" class="dim" font-size="11">Illustrative mock-up of the SwiftUI app — build the real thing: open Examples/ProximaDemoApp</text>
</svg>
