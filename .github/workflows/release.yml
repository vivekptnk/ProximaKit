name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Validate & Publish Release
    # grep/gh only — no Swift toolchain needed, so use the cheap runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fail the tag build if the runtime constant or CHANGELOG drifted from
      # the tag (ProximaKit.version shipped stale in v1.1.0 and v1.4.0).
      - name: Verify version constant matches tag
        run: bash .github/ci-scripts/check_version.sh "${GITHUB_REF_NAME#v}"

      - name: Extract CHANGELOG section for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Print the body of the '## [<version>]' section (up to the next '## ['
          # or a trailing '---' separator, whichever comes first).
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found && /^---$/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "::error::CHANGELOG.md has no section for version $version" >&2
            exit 1
          fi
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
