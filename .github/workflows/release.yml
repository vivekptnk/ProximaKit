name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  XCODE_VERSION: "16.2"

jobs:
  pq-validation:
    name: Validate PQ Acceptance Benchmarks
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app"

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ hashFiles('Package.swift', 'Sources/**/*.swift', 'Tests/**/*.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-

      - name: Run PQ acceptance benchmarks
        run: PROXIMA_PQ_BENCH=1 swift test -c release --filter PQBenchmarkTests

  release:
    name: Validate & Publish Release
    needs: pq-validation
    permissions:
      contents: write
    # Publication uses grep/gh only, so keep it on the inexpensive runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fail the tag build if the runtime constant or CHANGELOG drifted from
      # the tag (ProximaKit.version shipped stale in v1.1.0 and v1.4.0).
      - name: Verify version constant matches tag
        run: bash .github/ci-scripts/check_version.sh "${GITHUB_REF_NAME#v}"

      - name: Extract CHANGELOG section for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Print the body of the '## [<version>]' section (up to the next '## ['
          # or a trailing '---' separator, whichever comes first).
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found && /^---$/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "::error::CHANGELOG.md has no section for version $version" >&2
            exit 1
          fi
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
