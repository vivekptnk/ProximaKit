<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <style>
    .t { fill: #c9d1d9; }
    .dim { fill: #8b949e; }
    .ok { fill: #3fb950; }
    .warn { fill: #d29922; }
    .prompt { fill: #58a6ff; font-weight: 600; }
    .reveal { opacity: 0; animation: reveal 14s linear infinite; }
    .q1 { animation-delay: 0.6s; }
    .r1 { animation-delay: 1.6s; }
    .q2 { animation-delay: 6.6s; }
    .r2 { animation-delay: 7.6s; }
    @keyframes reveal {
      0%, 3% { opacity: 0; }
      6% { opacity: 1; }
      95% { opacity: 1; }
      100% { opacity: 0; }
    }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <rect fill="#0d1117" width="760" height="480" rx="10"/>
  <path fill="#161b22" d="M0 10 A10 10 0 0 1 10 0 H750 A10 10 0 0 1 760 10 V34 H0 Z"/>
