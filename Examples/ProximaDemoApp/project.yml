name: ProximaDemoApp
options:
  bundleIdPrefix: com.vivekptnk
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
    visionOS: "1.0"
  createIntermediateGroups: true
packages:
  ProximaKit:
    path: ../../
targets:
  ProximaDemoApp:
    type: application
    supportedDestinations: [macOS, iOS, visionOS]
    sources:
      - path: Sources
    dependencies:
      - package: ProximaKit
        product: ProximaKit
      - package: ProximaKit
        product: ProximaEmbeddings
    settings:
      base:
        SWIFT_VERSION: "5.9"
        # iPhone, iPad, Vision
        TARGETED_DEVICE_FAMILY: "1,2,7"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: ProximaKit Demo
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        # iOS/iPadOS: opt into the modern launch screen so the app renders
        # full-bleed instead of letterboxed.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
