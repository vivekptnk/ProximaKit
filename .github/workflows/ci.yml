name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref — force-pushed PR branches otherwise
# stack redundant macOS runs (the most expensive runner class).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "16.2"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app"

      # Cache strategy:
      # - Caches `.build` plus `~/Library/Caches/org.swift.swiftpm` (the macOS
      #   SwiftPM package/repository cache; `~/.cache/org.swift.swiftpm` is the
      #   Linux XDG path and is never written on macOS runners).
      # - Package.resolved is gitignored (not present after checkout), so the
      #   key hashes Package.swift plus the source tree instead. actions/cache
      #   only uploads on an exact-key miss, so including the sources keeps the
      #   `.build` snapshot rolling forward with every code change; restore-keys
      #   falls back to the nearest previous snapshot for incremental builds.
      # - Keyed on the Xcode version so a runner-image toolchain roll doesn't
      #   restore a `.build` that SwiftPM will invalidate wholesale anyway.
      # - The `swiftpm-` key namespace is distinct from benchmark.yml's
      #   `sift1m-` dataset cache. Keep this entry small (Debug + Release of a
      #   ~6K LOC package) so it does not push the ~500 MB SIFT1M blob out of
      #   the repository's 10 GiB cache quota.
      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ hashFiles('Package.swift', 'Sources/**/*.swift', 'Tests/**/*.swift', 'Examples/**/*.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-

      # Warnings-as-errors is CI-only (not in Package.swift) so consumers
      # building with future compilers are unaffected. Verified warning-free
      # with a clean `swift build -Xswiftc -warnings-as-errors` before adding.
      - name: Build (Debug)
        run: swift build -Xswiftc -warnings-as-errors

      - name: Build (Release)
        run: swift build -c release

      - name: Run Tests
        run: swift test --skip RecallBenchmarkTests --skip PQBenchmarkTests
        # RecallBenchmarkTests and PQBenchmarkTests are long-running acceptance
        # suites. They retain local environment gates and run in Release mode in
        # scheduled/release validation; all functional compaction, persistence,
        # quantization, and store tests remain in this per-push suite. Keep new
        # functional tests out of either benchmark class or CI will not run them.

      - name: Build Demo App
        run: swift build --target ProximaDemo

      - name: Build Documentation
        run: swift package generate-documentation --target ProximaKit

      - name: Check version / changelog consistency
        run: bash .github/ci-scripts/check_version.sh

  # EXPERIMENTAL — shadow of build-and-test's `Run Tests` step. Exists purely
  # to measure whether sharding the slow test run across a 4-way matrix cuts
  # wall time from the current 31-38 min monolithic run down to roughly the
  # slowest shard (~20 min, the M|N|P chunk), before anyone proposes it replace
  # the monolithic step.
  #
  # Shadow-mode only — by construction it cannot redden the repo's CI signal:
  # - `continue-on-error: true` is set at the JOB level (below), so a shard
  #   failure can never fail the workflow run or flip the overall CI signal.
  # - Nothing `needs:` this job, so it gates and blocks nothing.
  # - `fail-fast: false` lets all 4 shards finish even if one fails, so every
  #   shard's "Executed N tests" count is available for reconciliation.
  #
  # Acceptance criterion for later proposing the swap: the 4 shards' Executed
  # counts must sum to the monolithic `Run Tests` total. The four --filter
  # regexes partition the suite exactly when combined with the same
  # benchmark skips: PQBenchmarkTests falls inside MNP and RecallBenchmarkTests
  # falls inside QRSTVW, so those shards skip their benchmark class explicitly. Each
  # shard prints its "Executed N tests" line so the 4 counts can be summed and
  # compared against the monolithic run's total.
  test-sharded-experimental:
    name: Sharded Tests (EXPERIMENTAL — shadow only)
    runs-on: macos-15
    # Job-level continue-on-error: this is the mechanism that makes it
    # structurally impossible for this experimental job to redden CI. It is a
    # sibling of runs-on/strategy/steps — NOT nested inside any step.
    continue-on-error: true
    strategy:
      # All 4 shards must run to completion so their Executed counts can be
      # reconciled — never cancel siblings when one shard fails.
      fail-fast: false
      matrix:
        include:
          - name: chunk-BCDFH
            filter: '^ProximaKitTests\.(B|C|D|F|H)'
            skip: ''
          - name: chunk-MNP
            filter: '^ProximaKitTests\.(M|N|P)'
            skip: 'PQBenchmarkTests'
          - name: chunk-QRSTVW
            filter: '^ProximaKitTests\.(Q|R|S|T|V|W)'
            skip: 'RecallBenchmarkTests'
          - name: chunk-embeddings
            filter: '^ProximaEmbeddingsTests\.'
            skip: ''
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app"

      # Intentionally reuses build-and-test's EXACT cache key and restore-keys
      # (same hashFiles glob list, same fallback) so this job benefits from —
      # and contributes to — the same warm `.build` snapshot. That keeps the
      # per-shard test-execution timing an apples-to-apples comparison against
      # the monolithic step, which likewise runs tests off a fresh Debug build.
      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ hashFiles('Package.swift', 'Sources/**/*.swift', 'Tests/**/*.swift', 'Examples/**/*.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-

      - name: Build (Debug)
        run: swift build -Xswiftc -warnings-as-errors

      - name: Build (Release)
        run: swift build -c release

      - name: Run Tests (shard ${{ matrix.name }})
        # Shard the monolithic functional suite into one matrix.filter regex per
        # shard, applying the matching benchmark skip in MNP/QRSTVW. `set +e`
        # disables the runner's default
        # `-e` so a failing shard still reaches the reconciliation output; the
        # swift test exit status is captured from PIPESTATUS[0] (unaffected by
        # the `tee`) and re-exited at the end to keep this step's own reported
        # status honest — harmless given job-level continue-on-error above.
        run: |
          set +e
          LOG="shard-${{ matrix.name }}.log"
          if [ -n '${{ matrix.skip }}' ]; then
            swift test --filter '${{ matrix.filter }}' --skip '${{ matrix.skip }}' 2>&1 | tee "$LOG"
            status=${PIPESTATUS[0]}
          else
            swift test --filter '${{ matrix.filter }}' 2>&1 | tee "$LOG"
            status=${PIPESTATUS[0]}
          fi
          echo "::group::Executed count — shard ${{ matrix.name }}"
          grep -E 'Executed [0-9]+ tests?, with' "$LOG" | tail -n 1 \
            || echo "(no 'Executed N tests' summary line found in $LOG)"
          echo "::endgroup::"
          exit "$status"

  # Package.swift declares iOS 17 and visionOS 1, but `swift build` on a macOS
  # runner only compiles for the macOS SDK. ProximaEmbeddings imports
  # CoreML/NaturalLanguage/Vision, which have per-platform availability
  # differences, so compile (build-only, no tests) against the iOS SDK too.
  build-ios:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app"

      - name: Build for iOS Simulator (SDK-only)
        # xcodebuild needs an installed simulator RUNTIME to resolve a
        # destination, and macos-15 images ship inconsistent runtime sets
        # for pinned Xcodes ("iOS 18.2 is not installed"; and
        # -downloadPlatform itself flakes with "Unable to connect to
        # simulator"). Building against the iphonesimulator SDK with an
        # explicit triple compiles every target with zero runtime
        # dependency — same per-platform availability checking, no 6 GB
        # download, deterministic on every runner image.
        run: |
          SDK=$(xcrun --sdk iphonesimulator --show-sdk-path)
          swift build --sdk "$SDK" --triple arm64-apple-ios17.0-simulator

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        # Pinned: a floating `brew install` tracks latest, and new default
        # rules in a future SwiftLint release could break the strict gate
        # with no code change. Bump deliberately.
        # gh release download authenticates with the workflow token —
        # unauthenticated curl of release assets gets rate-limited on
        # shared runners (served an HTML error page instead of the zip).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download 0.63.2 --repo realm/SwiftLint \
            --pattern portable_swiftlint.zip --output /tmp/swiftlint.zip
          unzip -o /tmp/swiftlint.zip -d /tmp/swiftlint
          sudo cp /tmp/swiftlint/swiftlint /usr/local/bin/swiftlint
          swiftlint version

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

      # SwiftLint cannot see module import boundaries: a stray `import CoreML`
      # inside ProximaKit compiles cleanly (Apple SDK frameworks link against
      # any target, and Package.swift declares no per-target linkage that would
      # reject it), so only review catches it today. This POSIX-sh guard
      # enforces the CONTRIBUTING.md "Module Rules" allowlist — ProximaKit:
      # Foundation/Accelerate/Metal/Darwin/Glibc; ProximaEmbeddings additionally
      # CoreML/NaturalLanguage/Vision/CoreGraphics — and fails the job on any
      # forbidden import. The authoritative allowlist + per-import justification
      # live in the script's header comment.
      - name: Check import policy
        run: sh scripts/check-imports.sh
