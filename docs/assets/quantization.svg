<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12">
  <style>
    .t { fill: #c9d1d9; } .dim { fill: #8b949e; }
    .shrink1 { animation: s1 6s ease-in-out infinite; transform-origin: 150px 0; }
    @keyframes s1 { 0%,20% { transform: scaleX(1);} 45%,90% { transform: scaleX(0.2526);} 100% { transform: scaleX(1);} }
    .shrink2 { animation: s2 6s ease-in-out infinite; transform-origin: 150px 0; }
    @keyframes s2 { 0%,20% { transform: scaleX(1);} 45%,90% { transform: scaleX(0.03125);} 100% { transform: scaleX(1);} }
    .fade { animation: fd 6s ease-in-out infinite; }
    @keyframes fd { 0%,24% { opacity: 0;} 48%,88% { opacity: 1;} 100% { opacity: 0;} }
  </style>

  <text x="20" y="26" fill="#c9d1d9" font-size="14" font-weight="600">Quantization: same 384-dim vector, three footprints</text>

  <!-- Float32 reference -->
  <text x="20" y="68" class="t">Float32</text>
  <rect x="150" y="52" width="560" height="22" rx="5" fill="#30363d"/>
  <text x="156" y="68" class="dim">1,536 bytes — full precision</text>

  <!-- INT8 -->
  <text x="20" y="118" class="t">INT8 (SQ)</text>
  <rect class="shrink1" x="150" y="102" width="560" height="22" rx="5" fill="#58a6ff"/>
  <text class="fade" x="306" y="118" fill="#0d1117" font-weight="600">388 B</text>
  <text class="fade dim" x="346" y="118"> ≈ 3.96× smaller · any metric · no training (ADR-007)</text>

  <!-- PQ -->
  <text x="20" y="168" class="t">PQ codes</text>
  <rect class="shrink2" x="150" y="152" width="560" height="22" rx="5" fill="#bc8cff"/>
  <text class="fade" x="180" y="168" fill="#bc8cff" font-weight="600">48 B</text>
  <text class="fade dim" x="222" y="168">≈ 32× smaller · L2 ADC · k-means codebooks (ADR-011)</text>

  <text x="20" y="222" class="dim">Both build a full-precision HNSW graph first, then store only compressed codes —</text>
  <text x="20" y="238" class="dim">graph quality stays high while vector memory collapses. Recall floors are CI-asserted.</text>
</svg>
