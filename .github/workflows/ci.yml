name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build (Debug)
        run: swift build

      - name: Build (Release)
        run: swift build -c release

      - name: Run Tests
        run: swift test --skip RecallBenchmarkTests
        # RecallBenchmarkTests skipped in CI (take 2+ minutes, need large datasets)

      - name: Build Demo App
        run: swift build --target ProximaDemo
